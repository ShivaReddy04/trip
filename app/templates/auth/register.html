{% extends 'base.html' %}
{% block title %}Register - TripPlanner{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-12 h-12 gradient-bg rounded-xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="user-plus" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Create an account</h1>
            <p class="text-gray-500 mt-1">Start planning your perfect trip</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Role Tabs -->
            <div class="flex rounded-lg border border-gray-200 overflow-hidden">
                <label class="flex-1 text-center cursor-pointer">
                    <input type="radio" name="role" value="traveler" class="peer hidden" checked>
                    <div class="py-2.5 text-sm font-medium text-gray-600 peer-checked:bg-primary-500 peer-checked:text-white transition">
                        <i data-lucide="user" class="w-4 h-4 inline mr-1"></i>Traveler
                    </div>
                </label>
                <label class="flex-1 text-center cursor-pointer">
                    <input type="radio" name="role" value="vendor" class="peer hidden" id="vendor-radio">
                    <div class="py-2.5 text-sm font-medium text-gray-600 peer-checked:bg-primary-500 peer-checked:text-white transition">
                        <i data-lucide="briefcase" class="w-4 h-4 inline mr-1"></i>Vendor
                    </div>
                </label>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                    <input type="text" name="firstName" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                    <input type="text" name="lastName" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
            </div>

            <!-- Vendor field (hidden by default) -->
            <div id="vendor-fields" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                <input type="text" name="companyName"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required autocomplete="email"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                    placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required minlength="8"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                    placeholder="Min 8 characters">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" name="confirmPassword" required
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                    placeholder="••••••••">
            </div>

            <button type="submit" class="w-full gradient-bg text-white py-2.5 rounded-lg font-semibold hover:opacity-90 transition">
                Create Account
            </button>

            <p class="text-center text-sm text-gray-500">
                Already have an account?
                <a href="{{ url_for('auth.login') }}" class="text-primary-600 hover:text-primary-700 font-medium">Sign in</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.querySelectorAll('input[name="role"]').forEach(r => {
        r.addEventListener('change', function() {
            document.getElementById('vendor-fields').classList.toggle('hidden', this.value !== 'vendor');
        });
    });
</script>
{% endblock %}
