{% extends 'base.html' %}
{% block title %}Login - TripPlanner{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-12 h-12 gradient-bg rounded-xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="log-in" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
            <p class="text-gray-500 mt-1">Sign in to your account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            {% if request.args.get('next') %}
            <input type="hidden" name="next" value="{{ request.args.get('next') }}">
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required autocomplete="email"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                    placeholder="you@example.com">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1">
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-primary-600 hover:text-primary-700">Forgot password?</a>
                </div>
                <input type="password" name="password" required autocomplete="current-password"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                    placeholder="••••••••">
            </div>

            <button type="submit" class="w-full gradient-bg text-white py-2.5 rounded-lg font-semibold hover:opacity-90 transition">
                Sign In
            </button>

            <p class="text-center text-sm text-gray-500">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}" class="text-primary-600 hover:text-primary-700 font-medium">Sign up</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
