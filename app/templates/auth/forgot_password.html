{% extends 'base.html' %}
{% block title %}Forgot Password - TripPlanner{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-12 h-12 gradient-bg rounded-xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="key" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Forgot Password</h1>
            <p class="text-gray-500 mt-1">Enter your email to receive a reset link</p>
        </div>

        <form method="POST" class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                    placeholder="you@example.com">
            </div>

            <button type="submit" class="w-full gradient-bg text-white py-2.5 rounded-lg font-semibold hover:opacity-90 transition">
                Send Reset Link
            </button>

            <p class="text-center text-sm text-gray-500">
                <a href="{{ url_for('auth.login') }}" class="text-primary-600 hover:text-primary-700 font-medium">← Back to login</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
