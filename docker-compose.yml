

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trip-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5001:5000"
    environment:
      FLASK_ENV: production
      FLASK_APP: run:app
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trip_db
    depends_on:
      - db
    networks:
      - trip-network

  db:
    image: postgres:15
    container_name: trip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trip_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - trip-network

  nginx:
    image: nginx:alpine
    container_name: trip-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - trip-network
    profiles:
      - production

networks:
  trip-network:
    driver: bridge

volumes:
  postgres_data:
